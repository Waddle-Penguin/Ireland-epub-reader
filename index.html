<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EPUB Reader</title>

  <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    #viewer {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>
  <div id="viewer"></div>

  <script>
    const book = ePub("./book.epub");

    book.opened.then(() => {
      const rendition = book.renderTo("viewer", {
        width: "100%",
        height: "100%"
      });

      rendition.display();
    });
  </script>
</body>
</html>
