<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EPUB Reader</title>

  <!-- LOCAL epub.js (must be downloaded into your repo) -->
  <script src="./epub.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    #viewer {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>
  <div id="viewer"></div>

  <script>
    const book = ePub("./book.epub");

    const rendition = book.renderTo("viewer", {
      width: "100%",
      height: "100%"
    });

    rendition.display();
  </script>
</body>
</html>
