<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>EPUB Reader</title>

  <!-- epub.js MUST load before your script -->
  <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    #viewer {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>

  <!-- This MUST exist before JS runs -->
  <div id="viewer"></div>

  <script>
    // Safety check (helps debug instantly if something breaks)
    if (typeof ePub === "undefined") {
      console.error("epub.js failed to load");
    }

    const book = ePub("https://s3.amazonaws.com/moby-dick/moby-dick.epub");

    const rendition = book.renderTo("viewer", {
      width: "100%",
      height: "100%"
    });

    rendition.display()
      .then(() => {
        console.log("EPUB rendered successfully");
      })
      .catch(err => {
        console.error("EPUB render error:", err);
      });
  </script>

</body>
</html>
