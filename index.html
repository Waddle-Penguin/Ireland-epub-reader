<!DOCTYPE html>
<html>
<script>
  const book = ePub("./book.epub");

  const rendition = book.renderTo("viewer", {
    width: "100%",
    height: "100%"
  });

  rendition.display()
    .then(() => {
      console.log("Rendered successfully");
    })
    .catch(err => {
      console.error("Render failed:", err);
    });
</script>
</body>
</html>
