<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>EPUB Reader</title>
  <script src="https://unpkg.com/epubjs/dist/epub.min.js"></script>
  <style>
    body { margin: 0; }
    #viewer {
      height: 100vh;
      width: 100vw;
    }
  </style>
</head>

<body>
  <div id="viewer"></div>

  <script>
    const book = ePub("book.epub");
    const rendition = book.renderTo("viewer", {
      width: "100%",
      height: "100%"
    });

    rendition.display();
  </script>
</body>
</html>
