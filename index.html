<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EPUB Reader</title>

  <script src="./epub.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    #viewer {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>

<div id="viewer"></div>

<script>
  const book = ePub("./book.epub");

  const rendition = book.renderTo("viewer", {
    width: "100%",
    height: "100%"
  });

  // HARD FORCE FIRST CHAPTER DISPLAY
  book.ready
    .then(() => {
      return book.locations.generate(100); // ensures spine indexing
    })
    .then(() => {
      return rendition.display(0); // explicitly render first spine item
    })
    .catch(err => {
      console.error("Render error:", err);
    });
</script>

</body>
</html>
