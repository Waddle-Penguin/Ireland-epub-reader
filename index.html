<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="./epub.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
    }

    #viewer {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>

<div id="viewer"></div>

<script>
  const book = ePub("./book.epub");

  const rendition = book.renderTo("viewer", {
    width: "100%",
    height: "100%"
  });

  rendition.display();
</script>

</body>
</html>
